# =============================================================================
# Network Policy: Allow Backend Services to Receive Traffic from Ingress
# =============================================================================
# Each backend namespace needs to allow incoming traffic from ingress-nginx
# Labels are based on actual pod labels in the cluster
# =============================================================================

# ArgoCD Server - Allow from ingress-nginx
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-ingress-nginx
  namespace: argocd
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: argocd-server
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 443

