# PostgreSQL (CloudNativePG) Network Policies
# Allow ingress from application namespaces that need database access
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-allow-ingress
  namespace: postgres
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgresql
  policyTypes:
    - Ingress
  ingress:
    # Allow from AWX namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: awx
      ports:
        - protocol: TCP
          port: 5432
    # Allow from Keycloak namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: keycloak
      ports:
        - protocol: TCP
          port: 5432
    # Allow CNPG operator (for management)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cnpg-system
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 8000  # metrics
    # Allow internal cluster replication between postgres pods
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
      ports:
        - protocol: TCP
          port: 5432
---
# PostgreSQL egress - needs DNS, internal replication, API server, barman-cloud, and S3 for backups
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-allow-egress
  namespace: postgres
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgresql
  policyTypes:
    - Egress
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow access to Kubernetes API server (service IP)
    - to:
        - ipBlock:
            cidr: 10.96.0.0/16
      ports:
        - protocol: TCP
          port: 443
    # Allow access to Kubernetes API server (node IP)
    - to:
        - ipBlock:
            cidr: 10.70.0.0/24
      ports:
        - protocol: TCP
          port: 6443
    # Allow access to barman-cloud-plugin in cnpg-system
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cnpg-system
      ports:
        - protocol: TCP
          port: 9090
        - protocol: TCP
          port: 8080
    # Allow internal cluster replication
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
      ports:
        - protocol: TCP
          port: 5432
    # Allow S3 backup (Hetzner Object Storage) - HTTPS
    - to: []
      ports:
        - protocol: TCP
          port: 443
