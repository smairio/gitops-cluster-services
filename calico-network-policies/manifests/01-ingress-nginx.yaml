# =============================================================================
# Network Policy: Ingress-NGINX Controller
# =============================================================================
# The ingress-nginx controller needs to:
# - Receive external HTTP/HTTPS traffic (ports 80, 443)
# - Forward traffic to backend services in various namespaces
# - Communicate with kube-dns for service discovery
# =============================================================================

# Allow ingress-nginx to receive external traffic
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ingress-nginx-allow-external
  namespace: ingress-nginx
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ingress-nginx
  policyTypes:
    - Ingress
  ingress:
    # Allow HTTP traffic from anywhere
    - ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 8443
    # Allow metrics scraping from monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 10254

---
# Allow ingress-nginx egress to backends and DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ingress-nginx-allow-egress
  namespace: ingress-nginx
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ingress-nginx
  policyTypes:
    - Egress
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow traffic to argocd namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: argocd
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 8080
    # Allow traffic to awx namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: awx
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 8052
    # Allow traffic to elastic-system namespace (Kibana)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: elastic-system
      ports:
        - protocol: TCP
          port: 5601
    # Allow traffic to keycloak namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: keycloak
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8443
    # Allow traffic to monitoring namespace (Grafana, Prometheus)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 80    # Grafana service port
        - protocol: TCP
          port: 3000  # Grafana container port (if exposed directly)
        - protocol: TCP
          port: 9090  # Prometheus
