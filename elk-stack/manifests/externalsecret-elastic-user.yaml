# =============================================================================
# ExternalSecret - Elasticsearch Elastic User Password
# =============================================================================
# Pulls the custom elastic user password from Vault and creates the secret
# that ECK uses for the built-in 'elastic' superuser.
#
# ECK Convention: If a secret named '<cluster>-es-elastic-user' exists before
# the Elasticsearch resource is created, ECK will use it instead of generating
# a random password. The secret must contain a key named 'elastic'.
#
# Vault path: secret/khalil/argocd/elk  (property: password)
# =============================================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: elk-es-elastic-user
  namespace: elastic-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: elk-es-elastic-user
    creationPolicy: Owner
  data:
    - secretKey: elastic
      remoteRef:
        key: khalil/argocd/elk
        property: password
