# =============================================================================
# ExternalSecret - Elastic User Password from Vault
# =============================================================================
# Overrides the default auto-generated elastic user password with a custom one
# stored in Vault. ECK automatically uses a secret named <cluster>-es-elastic-user.
#
# Vault path: secret/khalil/argocd/elk
# Key: password
# =============================================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: elk-es-elastic-user
  namespace: elastic-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: elk-es-elastic-user
    creationPolicy: Owner
  data:
    - secretKey: elastic
      remoteRef:
        key: khalil/argocd/elk
        property: password
