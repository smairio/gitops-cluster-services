# =============================================================================
# Kibana Ingress - External Access
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kibana-ingress
  namespace: elastic-system
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - kibana.dev.tests.software
      secretName: kibana-tls
  rules:
    - host: kibana.dev.tests.software
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: elk-kb-http
                port:
                  number: 5601
---
# =============================================================================
# Elasticsearch Ingress - API Access for Filebeat
# =============================================================================
# This ingress exposes Elasticsearch API for log ingestion from external sources
# like Filebeat running on local machines or CI/CD pipelines.
#
# SECURITY NOTE: This endpoint receives logs from external sources.
# Production recommendation: Use IP whitelisting and strong credentials.
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: elasticsearch-ingress
  namespace: elastic-system
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    # Optional: IP whitelisting (uncomment and add your IP)
    # nginx.ingress.kubernetes.io/whitelist-source-range: "YOUR_IP/32"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - elasticsearch.dev.tests.software
      secretName: elasticsearch-tls
  rules:
    - host: elasticsearch.dev.tests.software
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: elk-es-http
                port:
                  number: 9200
