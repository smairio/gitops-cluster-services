# =============================================================================
# ElastAlert2 Secrets - Using ExternalSecrets from Vault
# =============================================================================
# Pulls Elasticsearch password from Vault and combines with SMTP config.
# Vault path: secret/khalil/argocd/elk (property: password)
# =============================================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: elastalert2-es-password
  namespace: elastic-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: elastalert2-es-password
    creationPolicy: Owner
  data:
    - secretKey: ES_PASSWORD
      remoteRef:
        key: khalil/argocd/elk
        property: password
---
# SMTP and email configuration (non-sensitive can be in ConfigMap)
# For production, consider using ExternalSecret for SMTP credentials too
apiVersion: v1
kind: Secret
metadata:
  name: elastalert2-smtp
  namespace: elastic-system
type: Opaque
stringData:
  # Mailhog for development (no auth required)
  SMTP_HOST: "mailhog.elastic-system.svc"
  SMTP_PORT: "1025"
  SMTP_TLS: "false"
  SMTP_USERNAME: ""
  SMTP_PASSWORD: ""
  # For production with Mailgun:
  # SMTP_HOST: "smtp.mailgun.org"
  # SMTP_PORT: "587"
  # SMTP_TLS: "true"
  # SMTP_USERNAME: "postmaster@YOUR_DOMAIN"
  # SMTP_PASSWORD: "YOUR_MAILGUN_PASSWORD"
---
apiVersion: v1
kind: Secret
metadata:
  name: elastalert2-email-config
  namespace: elastic-system
type: Opaque
stringData:
  SMTP_FROM: "terraform-alerts@tests.software"
  ALERT_EMAIL_TO: "smairio98@gmail.com"
