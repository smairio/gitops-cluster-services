apiVersion: apps/v1
kind: Deployment
metadata:
  name: elastalert2
  namespace: elastic-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: elastalert2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: elastalert2
    spec:
      nodeSelector:
        node-type: elk
      tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "elk"
          effect: "NoSchedule"
      initContainers:
        - name: render-config
          image: alpine:3.19
          command:
            - /bin/sh
            - -c
          args:
            - >-
              apk add --no-cache gettext >/dev/null &&
              mkdir -p /config/rules &&
              envsubst < /templates/config.yaml.tmpl > /config/config.yaml &&
              envsubst < /templates/rule.yaml.tmpl > /config/rules/terraform-failures.yaml &&
              printf "user: \"%s\"\npassword: \"%s\"\n" "$SMTP_USERNAME" "$SMTP_PASSWORD" > /config/smtp_auth
          envFrom:
            - configMapRef:
                name: elastalert2-env
            - secretRef:
                name: elastalert2-secrets
          volumeMounts:
            - name: templates
              mountPath: /templates
            - name: config
              mountPath: /config
        - name: create-index
          image: jertel/elastalert2:2.12.0
          command:
            - /bin/sh
            - -c
          args:
            - elastalert-create-index --config /config/config.yaml --index elastalert_status
          volumeMounts:
            - name: config
              mountPath: /config
            - name: es-ca
              mountPath: /certs
              readOnly: true
      containers:
        - name: elastalert2
          image: jertel/elastalert2:2.12.0
          command:
            - elastalert
          args:
            - --config
            - /config/config.yaml
          volumeMounts:
            - name: config
              mountPath: /config
            - name: es-ca
              mountPath: /certs
              readOnly: true
      volumes:
        - name: templates
          configMap:
            name: elastalert2-templates
        - name: config
          emptyDir: {}
        - name: es-ca
          secret:
            secretName: elk-es-http-certs-public
            items:
              - key: ca.crt
                path: ca.crt
